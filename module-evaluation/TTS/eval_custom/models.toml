# ============================================
# VITS 模型
# ============================================

[vits-icefall-aishell3]
type = "vits"
model = "models/TTS/vits-icefall-zh-aishell3/model.onnx"
lexicon = "models/TTS/vits-icefall-zh-aishell3/lexicon.txt"
tokens = "models/TTS/vits-icefall-zh-aishell3/tokens.txt"
rule_fsts = "models/TTS/vits-icefall-zh-aishell3/date.fst,models/TTS/vits-icefall-zh-aishell3/number.fst,models/TTS/vits-icefall-zh-aishell3/phone.fst,models/TTS/vits-icefall-zh-aishell3/new_heteronym.fst"
speaker_id = 0
speed = 1.0
sample_rate = 22050

[vits-aishell3]
type = "vits"
model = "models/TTS/vits-zh-aishell3/vits-aishell3.onnx"
lexicon = "models/TTS/vits-zh-aishell3/lexicon.txt"
tokens = "models/TTS/vits-zh-aishell3/tokens.txt"
rule_fsts = "models/TTS/vits-zh-aishell3/date.fst,models/TTS/vits-zh-aishell3/number.fst,models/TTS/vits-zh-aishell3/phone.fst,models/TTS/vits-zh-aishell3/new_heteronym.fst"
speaker_id = 0
speed = 1.0
sample_rate = 22050

[vits-melo-zh-en]
type = "vits"
model = "models/TTS/vits-melo-tts-zh_en/model.onnx"
lexicon = "models/TTS/vits-melo-tts-zh_en/lexicon.txt"
tokens = "models/TTS/vits-melo-tts-zh_en/tokens.txt"
rule_fsts = "models/TTS/vits-melo-tts-zh_en/date.fst,models/TTS/vits-melo-tts-zh_en/number.fst,models/TTS/vits-melo-tts-zh_en/phone.fst,models/TTS/vits-melo-tts-zh_en/new_heteronym.fst"
speaker_id = 0
speed = 1.0
sample_rate = 44100
# 句首缓冲字：Melo 初始解码器隐状态为零向量，前几帧不稳导致首字被截断。
# 自动在文本前加 "，" 吸收不稳定帧，生成后裁剪掉缓冲部分。
prepend_buffer = ""
# 双线程推理：Melo 44100Hz 采样率高，单线程 TTFT 偏高，开双线程利用多核加速
num_threads = 2

