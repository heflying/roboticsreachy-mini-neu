# ============================================
# Matcha-TTS 模型
# ============================================

[matcha-icefall-zh-baker]
type = "matcha"
acoustic_model = "models/TTS/matcha-icefall-zh-baker/model-steps-3.onnx"
vocoder = "models/TTS/matcha-icefall-zh-baker/vocos-22khz-univ.onnx"
lexicon = "models/TTS/matcha-icefall-zh-baker/lexicon.txt"
tokens = "models/TTS/matcha-icefall-zh-baker/tokens.txt"
rule_fsts = "models/TTS/matcha-icefall-zh-baker/date.fst,models/TTS/matcha-icefall-zh-baker/number.fst,models/TTS/matcha-icefall-zh-baker/phone.fst"
speaker_id = 0
speed = 1.0
# vocos-22khz-univ 输出采样率 22050 Hz
sample_rate = 22050
# 句首缓冲字：吸收 decoder 初始化不稳定帧
prepend_buffer = "，"
# 双线程推理：加速生成
num_threads = 2

