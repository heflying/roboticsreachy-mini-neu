# TTS 模型配置维护文件
# 路径均相对于项目根目录
# 使用方式：在 .env 中设置 TTS_MODEL=<模型名>，程序自动读取对应配置

# ============================================
# Piper 模型
# ============================================

[piper-chaowen]
type = "piper"
model = "models/TTS/piper-zh_CN-chaowen-medium/zh_CN-chaowen-medium.onnx"
tokens = "models/TTS/piper-zh_CN-chaowen-medium/tokens.txt"
lexicon = "models/TTS/piper-zh_CN-chaowen-medium/lexicon.txt"
rule_fsts = "models/TTS/piper-zh_CN-chaowen-medium/date.fst,models/TTS/piper-zh_CN-chaowen-medium/number.fst,models/TTS/piper-zh_CN-chaowen-medium/phone.fst"
speaker_id = 0
speed = 1.0
sample_rate = 22050

[piper-huayan]
type = "piper"
model = "models/TTS/piper-zh_CN-huayan-medium/zh_CN-huayan-medium.onnx"
tokens = "models/TTS/piper-zh_CN-huayan-medium/tokens.txt"
speaker_id = 0
speed = 1.0
sample_rate = 22050

[piper-xiao_ya]
type = "piper"
model = "models/TTS/piper-zh_CN-xiao_ya-medium/zh_CN-xiao_ya-medium.onnx"
tokens = "models/TTS/piper-zh_CN-xiao_ya-medium/tokens.txt"
lexicon = "models/TTS/piper-zh_CN-xiao_ya-medium/lexicon.txt"
rule_fsts = "models/TTS/piper-zh_CN-xiao_ya-medium/date.fst,models/TTS/piper-zh_CN-xiao_ya-medium/number.fst,models/TTS/piper-zh_CN-xiao_ya-medium/phone.fst"
