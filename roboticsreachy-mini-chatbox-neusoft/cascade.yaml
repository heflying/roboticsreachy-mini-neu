tts:
  provider: piper_zh  # tts_openai, kokoro, elevenlabs

  trim_silence: true

  providers:
    tts_openai:
      module: openai
      class: OpenAITTS
      location: cloud
      requires: [OPENAI_API_KEY]
      description: "OpenAI TTS API"
      # Settings
      voice: alloy
      model: tts-1  # tts-1 or tts-1-hd
      # Pricing (Feb 2026): $15/1M chars for tts-1, $30/1M chars for tts-1-hd
      cost_per_1m_chars: 15.0

    kokoro:
      module: kokoro
      class: KokoroTTS
      location: local
      requires: []
      hardware: null
      import_check: kokoro
      install_extra: cascade_kokoro
      description: "Kokoro local TTS - works on any PyTorch platform"
      # Settings
      voice: am_adam
      # No cost for local providers

    elevenlabs:
      module: elevenlabs
      class: ElevenLabsTTS
      location: cloud
      requires: [ELEVENLABS_API_KEY]
      description: "ElevenLabs TTS API"
      # Settings
      voice_id: pNInz6obpgDQGcFmaJgB
      model: eleven_flash_v2_5
      # Pricing (Feb 2026)
      cost_per_1m_chars: 30.0

    gradium:
      module: gradium
      class: GradiumTTS
      location: cloud
      requires: [GRADIUM_API_KEY]
      import_check: gradium
      install_extra: cascade_gradium
      description: "Gradium TTS - low-latency streaming voice AI"
      # Settings
      voice_id: YTpq7expH9539ERJ  # Emma (US/Feminine)
      model: default
      cost_per_1m_chars: 0.0

    qwen_realtime_tts:
      module: qwen_realtime
      class: QwenRealtimeTTS
      location: cloud
      requires: [DASHSCOPE_API_KEY]
      hardware: null
      import_check: websockets
      install_extra: cascade_qwen
      description: "Qwen realtime TTS via DashScope WebSocket"
      model: qwen3-tts-flash-realtime
      websocket_url: wss://dashscope.aliyuncs.com/api-ws/v1/realtime
      voice: Ethan
      response_format: pcm
      sample_rate: 24000
      mode: commit
      language_type: Chinese

    piper_zh:
      module: piper
      class: PiperTTS
      location: local
      requires: []
      hardware: null
      import_check: piper
      install_extra: cascade_piper
      description: "Piper 本地中文 TTS - 轻量高性能"
      model_onnx_path: models/TTS/piper-zh_CN-xiao_ya-medium/zh_CN-xiao_ya-medium.onnx
      noise_scale: 0.667
      length_scale: 1.0
      noise_w: 0.8

    kokoro_zh:
      module: kokoro_zh
      class: KokoroZHTTS
      location: local
      requires: []
      hardware: null
      import_check: kokoro
      install_extra: cascade_kokoro_zh
      description: "Kokoro-82M-v1.1-zh 中文 TTS - 高质量本地中文语音合成"
      voice: zf_001
      repo_id: hexgrad/Kokoro-82M-v1.1-zh
      device: cpu

    kokoro_zh_onnx:
      module: kokoro_zh_onnx
      class: KokoroZhOnnxTTS
      location: local
      requires: []
      hardware: null
      import_check: kokoro_onnx
      install_extra: cascade_kokoro_zh_onnx
      description: "Kokoro-zh ONNX 量化模型 (INT8, ~127MB) - CPU高速推理, ~5-10x faster"
      voice: zf_001
      model_variant: quantized
      device: cpu

    kokoro_zh_onnx_fp32:
      module: kokoro_zh_onnx
      class: KokoroZhOnnxTTS
      location: local
      requires: []
      hardware: null
      import_check: kokoro_onnx
      install_extra: cascade_kokoro_zh_onnx
      description: "Kokoro-zh ONNX 标准模型 (FP32, ~339MB) - CPU高质量推理"
      voice: zf_001
      model_variant: normal
      device: cpu


# Transcript analysis: real-time reactions to keywords/entities in user speech
# Reactions are defined per-profile in profiles/<name>/reactions.yaml
transcript_analysis:
  gliner_model: urchade/gliner_small-v2.1  # GLiNER model for entity recognition
