      location: cloud
      requires: [DASHSCOPE_API_KEY]
      description: "Qwen Flash via DashScope OpenAI-compatible API, optimized for lower latency"
      model: qwen-flash
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      enable_thinking: false
      input_cost_per_1m: 0.0
      output_cost_per_1m: 0.0

    ollama-qwen2.5-0.5b:
      module: ollama
      class: OllamaLLM
      location: local
      requires: []
